<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GC Overhead vs --max-old-space-size</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
      .viz-root {
        /* categorical slots — fixed order (CVD-validated, palette.md) */
        --s1: #2a78d6; /* MinorGC       blue   */
        --s2: #1baf7a; /* MajorGC       aqua   */
        --s3: #eda100; /* IncrementalGC yellow */
        --s4: #008300; /* Total avg     green  */
        /* chrome */
        --surface-1: #fcfcfb;
        --page-plane: #f9f9f7;
        --text-pri: #0b0b0b;
        --text-sec: #52514e;
        --text-muted: #898781;
        --gridline: #e1e0d9;
        --baseline: #c3c2b7;
      }
      @media (prefers-color-scheme: dark) {
        .viz-root {
          --s1: #3987e5;
          --s2: #199e70;
          --s3: #c98500;
          --s4: #008300;
          --surface-1: #1a1a19;
          --page-plane: #0d0d0d;
          --text-pri: #ffffff;
          --text-sec: #c3c2b7;
          --text-muted: #898781;
          --gridline: #2c2c2a;
          --baseline: #383835;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body.viz-root {
        background: var(--page-plane);
        color: var(--text-pri);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        padding: 28px 36px 56px;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .subhead {
        color: var(--text-sec);
        font-size: 13px;
        margin-bottom: 32px;
      }
      code {
        font-family: ui-monospace, "Cascadia Code", Menlo, monospace;
        font-size: 0.9em;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      figure {
        background: var(--surface-1);
        border: 1px solid var(--gridline);
        border-radius: 8px;
        padding: 20px 20px 16px;
      }
      figcaption {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-sec);
        margin-bottom: 12px;
      }
      .chart-wrap {
        position: relative;
        height: 280px;
      }
    </style>
    <meta name="author" content="vivaxy <xyxuye2007@126.com>" />
    <meta
      name="keywords"
      content="vivaxy,examples,github,demo,playground,node-js,max-old-space-size,test,sample,demos,samples,example,gc-overhead"
    />
    <meta name="description" content="GC Overhead vs --max-old-space-size" />
  </head>
  <body class="viz-root">
    <h1>GC Overhead vs <code>--max-old-space-size</code></h1>
    <p class="subhead">
      5,000 iterations &nbsp;·&nbsp; 200 × 100&nbsp;KB ≈ 20&nbsp;MB working set
      &nbsp;·&nbsp; x-axis: flag value (effective
      <code>heap_size_limit</code> in parentheses)
    </p>
    <div class="grid">
      <figure>
        <figcaption>1 &nbsp;GC share of elapsed time &nbsp;(%)</figcaption>
        <div class="chart-wrap"><canvas id="c1"></canvas></div>
      </figure>
      <figure>
        <figcaption>2 &nbsp;GC total time &nbsp;(ms)</figcaption>
        <div class="chart-wrap"><canvas id="c2"></canvas></div>
      </figure>
      <figure>
        <figcaption>3 &nbsp;GC event count</figcaption>
        <div class="chart-wrap"><canvas id="c3"></canvas></div>
      </figure>
      <figure>
        <figcaption>4 &nbsp;Avg time per event &nbsp;(ms / event)</figcaption>
        <div class="chart-wrap"><canvas id="c4"></canvas></div>
      </figure>
    </div>

    <script>
      "use strict";
      var DATA = {
        rows: [
          {
            flagMb: 64,
            limitMb: 112,
            minorPct: 1.2,
            majorPct: 56.76,
            incrPct: 0.07,
            minorMs: 4,
            majorMs: 192,
            incrMs: 0,
            minorCount: 8,
            majorCount: 60,
            incrCount: 2,
            minorAvg: 0.51,
            majorAvg: 3.2,
            incrAvg: 0.11,
            totalAvg: 2.8,
            totalPct: 58.03,
            totalMs: 196,
            totalCount: 70,
          },
          {
            flagMb: 128,
            limitMb: 176,
            minorPct: 10.6,
            majorPct: 26.8,
            incrPct: 0.47,
            minorMs: 28,
            majorMs: 71,
            incrMs: 1,
            minorCount: 54,
            majorCount: 14,
            incrCount: 14,
            minorAvg: 0.52,
            majorAvg: 5.09,
            incrAvg: 0.09,
            totalAvg: 1.23,
            totalPct: 37.87,
            totalMs: 101,
            totalCount: 82,
          },
          {
            flagMb: 256,
            limitMb: 304,
            minorPct: 11.29,
            majorPct: 23.72,
            incrPct: 0.36,
            minorMs: 25,
            majorMs: 53,
            incrMs: 1,
            minorCount: 59,
            majorCount: 9,
            incrCount: 9,
            minorAvg: 0.43,
            majorAvg: 5.9,
            incrAvg: 0.09,
            totalAvg: 1.03,
            totalPct: 35.37,
            totalMs: 79,
            totalCount: 77,
          },
          {
            flagMb: 512,
            limitMb: 560,
            minorPct: 12.46,
            majorPct: 19.24,
            incrPct: 0.28,
            minorMs: 27,
            majorMs: 42,
            incrMs: 1,
            minorCount: 61,
            majorCount: 6,
            incrCount: 6,
            minorAvg: 0.44,
            majorAvg: 6.93,
            incrAvg: 0.1,
            totalAvg: 0.95,
            totalPct: 31.98,
            totalMs: 69,
            totalCount: 73,
          },
          {
            flagMb: 1024,
            limitMb: 1072,
            minorPct: 13.1,
            majorPct: 17.56,
            incrPct: 0.17,
            minorMs: 36,
            majorMs: 48,
            incrMs: 0,
            minorCount: 64,
            majorCount: 3,
            incrCount: 3,
            minorAvg: 0.56,
            majorAvg: 15.92,
            incrAvg: 0.16,
            totalAvg: 1.2,
            totalPct: 30.84,
            totalMs: 84,
            totalCount: 70,
          },
          {
            flagMb: 2048,
            limitMb: 2096,
            minorPct: 18.48,
            majorPct: 16.07,
            incrPct: 0.15,
            minorMs: 58,
            majorMs: 51,
            incrMs: 0,
            minorCount: 66,
            majorCount: 2,
            incrCount: 2,
            minorAvg: 0.88,
            majorAvg: 25.3,
            incrAvg: 0.24,
            totalAvg: 1.56,
            totalPct: 34.7,
            totalMs: 109,
            totalCount: 70,
          },
          {
            flagMb: 4096,
            limitMb: 4144,
            minorPct: 17.22,
            majorPct: 18.76,
            incrPct: 0.17,
            minorMs: 45,
            majorMs: 49,
            incrMs: 0,
            minorCount: 66,
            majorCount: 2,
            incrCount: 2,
            minorAvg: 0.68,
            majorAvg: 24.42,
            incrAvg: 0.22,
            totalAvg: 1.34,
            totalPct: 36.15,
            totalMs: 94,
            totalCount: 70,
          },
          {
            flagMb: 8192,
            limitMb: 8240,
            minorPct: 18.32,
            majorPct: 15.32,
            incrPct: 0.17,
            minorMs: 53,
            majorMs: 44,
            incrMs: 0,
            minorCount: 66,
            majorCount: 2,
            incrCount: 2,
            minorAvg: 0.8,
            majorAvg: 22.06,
            incrAvg: 0.24,
            totalAvg: 1.39,
            totalPct: 33.8,
            totalMs: 97,
            totalCount: 70,
          },
          {
            flagMb: 16384,
            limitMb: 16432,
            minorPct: 18.09,
            majorPct: 17.07,
            incrPct: 0.16,
            minorMs: 47,
            majorMs: 44,
            incrMs: 0,
            minorCount: 66,
            majorCount: 2,
            incrCount: 2,
            minorAvg: 0.71,
            majorAvg: 22.1,
            incrAvg: 0.21,
            totalAvg: 1.31,
            totalPct: 35.32,
            totalMs: 91,
            totalCount: 70,
          },
        ],
      };
      var rows = DATA.rows;

      /* read a CSS custom property from the root element */
      function css(name) {
        return getComputedStyle(document.body).getPropertyValue(name).trim();
      }

      /* snapshot all palette roles from current CSS variables */
      function palette() {
        return {
          s1: css("--s1"),
          s2: css("--s2"),
          s3: css("--s3"),
          s4: css("--s4"),
          surface: css("--surface-1"),
          textSec: css("--text-sec"),
          textMuted: css("--text-muted"),
          gridline: css("--gridline"),
          baseline: css("--baseline"),
        };
      }

      /* x-axis labels: two-line — flag value / effective limit */
      var labels = rows.map(function (r) {
        return [r.flagMb + " MB", "(" + r.limitMb + " MB)"];
      });

      /* ── stacked-bar dataset helpers ──────────────────────────────────────────── */
      /* The 2 px border in the surface color creates the surface gap between
   stacked segments per marks-and-anatomy.md. */
      function dsStack(label, data, color, surface) {
        return {
          label: label,
          data: data,
          backgroundColor: color,
          borderColor: surface,
          borderWidth: { top: 2, right: 0, bottom: 0, left: 0 },
          borderRadius: 0,
          borderSkipped: "bottom",
          maxBarThickness: 48,
        };
      }
      /* topmost segment in a stack gets the 4 px rounded data-end */
      function dsStackTop(label, data, color, surface) {
        var d = dsStack(label, data, color, surface);
        d.borderRadius = { topLeft: 4, topRight: 4 };
        return d;
      }

      /* ── grouped-bar dataset helper ───────────────────────────────────────────── */
      function dsGroup(label, data, color) {
        return {
          label: label,
          data: data,
          backgroundColor: color,
          borderRadius: 4,
          maxBarThickness: 24,
        };
      }

      /* ── bar-cap total-label plugin ───────────────────────────────────────────── */
      /* Writes the total above the topmost stacked segment.
   Relief for sub-3:1 slots (aqua, yellow): direct labels are the mitigation. */
      function makeTotalPlugin(fmtFn) {
        return {
          id: "totalLabel",
          afterDatasetsDraw: function (chart) {
            var ctx = chart.ctx;
            var p = palette();
            var dsCount = chart.data.datasets.length;
            var lastMeta = chart.getDatasetMeta(dsCount - 1);
            ctx.save();
            ctx.textAlign = "center";
            ctx.textBaseline = "bottom";
            ctx.fillStyle = p.textSec;
            ctx.font = "bold 11px system-ui, sans-serif";
            lastMeta.data.forEach(function (bar, i) {
              var total = chart.data.datasets.reduce(function (s, ds) {
                return s + (Number(ds.data[i]) || 0);
              }, 0);
              ctx.fillText(fmtFn(total), bar.x, bar.y - 4);
            });
            ctx.restore();
          },
        };
      }

      /* ── shared axis / plugin options ─────────────────────────────────────────── */
      function scalesStacked(p, yTitle) {
        return {
          x: {
            stacked: true,
            ticks: { color: p.textSec, font: { size: 12 } },
            grid: { display: false },
            border: { color: p.baseline },
          },
          y: {
            stacked: true,
            title: {
              display: true,
              text: yTitle,
              color: p.textMuted,
              font: { size: 12 },
            },
            ticks: { color: p.textSec, font: { size: 12 } },
            grid: { color: p.gridline, lineWidth: 1 },
            border: { display: false },
          },
        };
      }

      function scalesGrouped(p, yTitle) {
        return {
          x: {
            ticks: { color: p.textSec, font: { size: 12 } },
            grid: { display: false },
            border: { color: p.baseline },
          },
          y: {
            title: {
              display: true,
              text: yTitle,
              color: p.textMuted,
              font: { size: 12 },
            },
            ticks: { color: p.textSec, font: { size: 12 } },
            grid: { color: p.gridline, lineWidth: 1 },
            border: { display: false },
          },
        };
      }

      function legendOpts(p) {
        return {
          position: "bottom",
          labels: {
            color: p.textSec,
            usePointStyle: true,
            pointStyleWidth: 10,
            padding: 14,
            font: { size: 12 },
          },
        };
      }

      /* ── build all four charts ────────────────────────────────────────────────── */
      var charts = [];

      function buildCharts() {
        charts.forEach(function (c) {
          c.destroy();
        });
        charts = [];
        var p = palette();
        var surf = p.surface;

        /* chart 1 — GC share of elapsed time (%) */
        charts.push(
          new Chart(document.getElementById("c1"), {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                dsStack(
                  "MinorGC",
                  rows.map(function (r) {
                    return r.minorPct;
                  }),
                  p.s1,
                  surf,
                ),
                dsStack(
                  "MajorGC",
                  rows.map(function (r) {
                    return r.majorPct;
                  }),
                  p.s2,
                  surf,
                ),
                dsStackTop(
                  "IncrementalGC",
                  rows.map(function (r) {
                    return r.incrPct;
                  }),
                  p.s3,
                  surf,
                ),
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              plugins: {
                legend: legendOpts(p),
                tooltip: {
                  mode: "index",
                  intersect: false,
                  callbacks: {
                    label: function (ctx) {
                      return (
                        " " +
                        ctx.dataset.label +
                        ": " +
                        ctx.parsed.y.toFixed(1) +
                        " %"
                      );
                    },
                    afterBody: function (items) {
                      var total = items.reduce(function (s, it) {
                        return s + it.parsed.y;
                      }, 0);
                      return ["Total: " + total.toFixed(1) + " %"];
                    },
                  },
                },
              },
              scales: scalesStacked(p, "%"),
            },
            plugins: [
              makeTotalPlugin(function (v) {
                return v.toFixed(1) + " %";
              }),
            ],
          }),
        );

        /* chart 2 — GC total time (ms) */
        charts.push(
          new Chart(document.getElementById("c2"), {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                dsStack(
                  "MinorGC",
                  rows.map(function (r) {
                    return r.minorMs;
                  }),
                  p.s1,
                  surf,
                ),
                dsStack(
                  "MajorGC",
                  rows.map(function (r) {
                    return r.majorMs;
                  }),
                  p.s2,
                  surf,
                ),
                dsStackTop(
                  "IncrementalGC",
                  rows.map(function (r) {
                    return r.incrMs;
                  }),
                  p.s3,
                  surf,
                ),
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              plugins: {
                legend: legendOpts(p),
                tooltip: {
                  mode: "index",
                  intersect: false,
                  callbacks: {
                    label: function (ctx) {
                      return (
                        " " +
                        ctx.dataset.label +
                        ": " +
                        Math.round(ctx.parsed.y) +
                        " ms"
                      );
                    },
                    afterBody: function (items) {
                      var total = items.reduce(function (s, it) {
                        return s + it.parsed.y;
                      }, 0);
                      return ["Total: " + Math.round(total) + " ms"];
                    },
                  },
                },
              },
              scales: scalesStacked(p, "ms"),
            },
            plugins: [
              makeTotalPlugin(function (v) {
                return Math.round(v) + " ms";
              }),
            ],
          }),
        );

        /* chart 3 — GC event count */
        charts.push(
          new Chart(document.getElementById("c3"), {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                dsStack(
                  "MinorGC",
                  rows.map(function (r) {
                    return r.minorCount;
                  }),
                  p.s1,
                  surf,
                ),
                dsStack(
                  "MajorGC",
                  rows.map(function (r) {
                    return r.majorCount;
                  }),
                  p.s2,
                  surf,
                ),
                dsStackTop(
                  "IncrementalGC",
                  rows.map(function (r) {
                    return r.incrCount;
                  }),
                  p.s3,
                  surf,
                ),
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              plugins: {
                legend: legendOpts(p),
                tooltip: {
                  mode: "index",
                  intersect: false,
                  callbacks: {
                    label: function (ctx) {
                      return (
                        " " +
                        ctx.dataset.label +
                        ": " +
                        ctx.parsed.y +
                        " events"
                      );
                    },
                    afterBody: function (items) {
                      var total = items.reduce(function (s, it) {
                        return s + it.parsed.y;
                      }, 0);
                      return ["Total: " + total + " events"];
                    },
                  },
                },
              },
              scales: scalesStacked(p, "events"),
            },
            plugins: [
              makeTotalPlugin(function (v) {
                return Math.round(v);
              }),
            ],
          }),
        );

        /* chart 4 — avg time per event (ms/event) — grouped bar */
        charts.push(
          new Chart(document.getElementById("c4"), {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                dsGroup(
                  "MinorGC",
                  rows.map(function (r) {
                    return r.minorAvg;
                  }),
                  p.s1,
                ),
                dsGroup(
                  "MajorGC",
                  rows.map(function (r) {
                    return r.majorAvg;
                  }),
                  p.s2,
                ),
                dsGroup(
                  "IncrementalGC",
                  rows.map(function (r) {
                    return r.incrAvg;
                  }),
                  p.s3,
                ),
                dsGroup(
                  "Total avg",
                  rows.map(function (r) {
                    return r.totalAvg;
                  }),
                  p.s4,
                ),
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              plugins: {
                legend: legendOpts(p),
                tooltip: {
                  mode: "index",
                  intersect: false,
                  callbacks: {
                    label: function (ctx) {
                      return (
                        " " +
                        ctx.dataset.label +
                        ": " +
                        ctx.parsed.y.toFixed(2) +
                        " ms"
                      );
                    },
                  },
                },
              },
              scales: scalesGrouped(p, "ms / event"),
            },
          }),
        );
      }

      buildCharts();

      /* rebuild on OS color-scheme change so CSS vars re-resolve */
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", buildCharts);
    </script>
  </body>
</html>
